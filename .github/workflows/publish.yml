# Tag-driven crates.io + npm publish for the basecrawl public surface.
#
# Triggers:
#   - push of tags matching v*  → live publish (after dry-run gate)
#   - workflow_dispatch          → optional dry-run (default true)
#
# Ordered cargo publish topology (VAL-CRATES-001):
#   basecrawl-headless-chrome → proof → fp → seal → render → core → ffi → thin basecrawl
#
# Secrets (names only; never print, never hard-code):
#   CARGO_REGISTRY_TOKEN — crates.io API token
#   NPM_TOKEN            — OPTIONAL legacy fallback only. npm job primary path is
#                          Trusted Publishing via GitHub Actions OIDC (no bypass-2FA
#                          granular token required for `npm publish`).
#
# npm Trusted Publishing (primary):
#   - Job permissions: id-token: write (+ contents: read)
#   - Node ≥22.14 and npm CLI ≥11.5.1 (OIDC short-lived exchange)
#   - setup-node keeps registry-url; no NODE_AUTH_TOKEN required for publish
#   - Soft residual classes when package is absent or Trusted Publisher not linked:
#       TYPED_BLOCKER=package_not_on_registry
#       TYPED_BLOCKER=npm_trusted_publisher_missing
#   - First package create (if registry 404): human Path B — local OTP publish as
#     echobt1 from linux host bindings/node, then configure Trusted Publisher on
#     npmjs.com (GitHub org BaseIntelligence, repo basecrawl, workflow publish.yml).
#
# Day-0 multi-name crates.io uploads (hobby accounts):
#   crates.io rate-limits *new crate names* (~10 minutes between names). The crates
#   job adapts: retry/sleep on HTTP 429 ("too many new crates" / "try again after"),
#   skips versions already live at the tag version (no forced republish unless bump),
#   and continues the ordered chain on re-dispatch after partial uploads.
#
# Quality: this workflow re-runs CI parity (fmt / clippy / workspace tests).
# Existing .github/workflows/ci.yml remains the continuous quality gate and is not modified.
# image.yml remains the separate GHCR path.
name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (no live crates.io / npm publish)"
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  # Publish topology — single source of order for dry-run and live steps.
  PUBLISH_CRATES: >-
    basecrawl-headless-chrome
    basecrawl-proof
    basecrawl-fp
    basecrawl-seal
    basecrawl-render
    basecrawl-core
    basecrawl-ffi
    basecrawl

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate (CI parity with ci.yml: fmt, clippy -D warnings, workspace tests)
  # ---------------------------------------------------------------------------
  quality:
    name: Quality (CI parity)
    runs-on: ubuntu-latest
    services:
      httpbin:
        # Classic Python httpbin for hermetic HTTP-semantics tests (matches ci.yml).
        image: kennethreitz/httpbin:latest
        ports:
          - 8080:80
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Wait for hermetic httpbin
        run: |
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null -w "%{http_code}" "http://127.0.0.1:8080/get" | grep -q '^200$'; then
              echo "httpbin ready"
              exit 0
            fi
            sleep 1
          done
          echo "hermetic httpbin did not become ready" >&2
          exit 1

      - name: Cargo test
        run: cargo test --workspace --all-features
        env:
          RUST_TEST_THREADS: "1"
          BASECRAWL_HTTPBIN_BASE: http://127.0.0.1:8080

  # ---------------------------------------------------------------------------
  # Version match: tag vX.Y.Z == workspace package version == npm package.json
  # ---------------------------------------------------------------------------
  version-check:
    name: Version match
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version and dry-run mode
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          WORKSPACE_VERSION="$(
            python3 - <<'PY'
          import re, pathlib
          text = pathlib.Path("Cargo.toml").read_text()
          # Prefer [workspace.package] version = "X.Y.Z"
          m = re.search(
              r'(?ms)^\[workspace\.package\]\s*.*?^version\s*=\s*"([^"]+)"',
              text,
          )
          if not m:
              raise SystemExit("workspace.package.version not found in Cargo.toml")
          print(m.group(1))
          PY
          )"
          NPM_VERSION="$(
            python3 - <<'PY'
          import json, pathlib
          pkg = json.loads(pathlib.Path("bindings/node/package.json").read_text())
          print(pkg.get("version", ""))
          PY
          )"

          if [[ -z "${WORKSPACE_VERSION}" ]]; then
            echo "workspace version empty" >&2
            exit 1
          fi
          if [[ -z "${NPM_VERSION}" ]]; then
            echo "bindings/node/package.json version empty" >&2
            exit 1
          fi
          if [[ "${NPM_VERSION}" != "${WORKSPACE_VERSION}" ]]; then
            echo "version mismatch: workspace=${WORKSPACE_VERSION} npm=${NPM_VERSION}" >&2
            exit 1
          fi

          # Determine dry-run: workflow_dispatch defaults to dry-run; tag push is live.
          DRY_RUN="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              DRY_RUN="true"
            else
              DRY_RUN="false"
            fi
            EXPECTED="${WORKSPACE_VERSION}"
            echo "workflow_dispatch: using workspace version ${EXPECTED} (dry_run=${DRY_RUN})"
          else
            # Tag push: refs/tags/vX.Y.Z
            REF_NAME="${GITHUB_REF_NAME:-}"
            if [[ ! "${REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
              echo "tag '${REF_NAME}' does not match vX.Y.Z*" >&2
              exit 1
            fi
            TAG_VERSION="${REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${WORKSPACE_VERSION}" ]]; then
              echo "tag version ${TAG_VERSION} != workspace/npm version ${WORKSPACE_VERSION}" >&2
              exit 1
            fi
            EXPECTED="${TAG_VERSION}"
            DRY_RUN="false"
            echo "tag push: version ${EXPECTED} (live publish after dry-run gate)"
          fi

          # Also fail if any public workspace crate pin drifts from workspace version.
          for crate_toml in \
            crates/basecrawl-proof/Cargo.toml \
            crates/basecrawl-fp/Cargo.toml \
            crates/basecrawl-seal/Cargo.toml \
            crates/basecrawl-render/Cargo.toml \
            crates/basecrawl-core/Cargo.toml \
            crates/basecrawl-ffi/Cargo.toml \
            crates/basecrawl/Cargo.toml
          do
            if ! grep -q 'version.workspace = true' "${crate_toml}"; then
              # bare version= allowed only if it matches EXPECTED
              ver="$(python3 -c "import re,pathlib,sys; t=pathlib.Path(sys.argv[1]).read_text(); m=re.search(r'^version\s*=\s*\"([^\"]+)\"', t, re.M); print(m.group(1) if m else '')" "${crate_toml}")"
              if [[ "${ver}" != "${EXPECTED}" ]]; then
                echo "crate ${crate_toml} version '${ver}' != expected ${EXPECTED}" >&2
                exit 1
              fi
            fi
          done
          FORK_VERSION="$(
            python3 -c "import re,pathlib; t=pathlib.Path('crates/basecrawl-headless-chrome/Cargo.toml').read_text(); m=re.search(r'^version\s*=\s*\"([^\"]+)\"', t, re.M); print(m.group(1) if m else '')"
          )"
          if [[ "${FORK_VERSION}" != "${EXPECTED}" ]]; then
            echo "basecrawl-headless-chrome version ${FORK_VERSION} != expected ${EXPECTED}" >&2
            exit 1
          fi

          echo "version=${EXPECTED}" >> "${GITHUB_OUTPUT}"
          echo "dry_run=${DRY_RUN}" >> "${GITHUB_OUTPUT}"
          echo "Resolved publish version=${EXPECTED} dry_run=${DRY_RUN}"

  # ---------------------------------------------------------------------------
  # Ordered cargo publish (dry-run gate always; live only when not dry_run)
  # ---------------------------------------------------------------------------
  crates:
    name: crates.io ordered publish
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Ordered dry-run then optional live publish
        shell: bash
        env:
          # Secret by name only when live publishing. Never echo raw value.
          # GitHub Actions masks secret-backed env values in logs.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ needs.version-check.outputs.dry_run }}
          PUBLISH_VERSION: ${{ needs.version-check.outputs.version }}
          # Day-0 "new crate name" hobby rate limit is on the order of ~10 minutes.
          # Overridable for tests/operators; defaults keep multi-name first uploads survivable.
          NEW_CRATE_INDEX_PAUSE_SECS: "20"
          NEW_CRATE_RATE_LIMIT_MAX_ATTEMPTS: "8"
          NEW_CRATE_RATE_LIMIT_CAP_SECS: "720"
          NEW_CRATE_RATE_LIMIT_BASE_SECS: "90"
        run: |
          set -euo pipefail

          # shellcheck source=../../scripts/publish-crates-helpers.sh
          # Day-0 helpers: 429 adaptive wait, already-live skip, already-uploaded continue.
          # Shared with scripts/tests/test_publish_crates_helpers.sh (hermetic).
          source "${GITHUB_WORKSPACE}/scripts/publish-crates-helpers.sh"

          is_dry="${DRY_RUN}"
          echo "Ordered crates publish for version=${PUBLISH_VERSION} dry_run=${is_dry}"
          echo "Topology: basecrawl-headless-chrome → proof → fp → seal → render → core → ffi → basecrawl"

          if [[ "${is_dry}" != "true" ]]; then
            if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
              echo "CARGO_REGISTRY_TOKEN secret is not set on this repository" >&2
              exit 1
            fi
            # Length-only presence check — never print the token value.
            echo "CARGO_REGISTRY_TOKEN is present (length=${#CARGO_REGISTRY_TOKEN})"
          else
            # Dry-run mode must not require a registry token.
            unset CARGO_REGISTRY_TOKEN || true
            echo "dry_run mode: CARGO_REGISTRY_TOKEN unset for tokenless dry packaging"
          fi

          # Per-crate: dry-run/verify first, then live publish (VAL-CRATES-001/002).
          # Dependents convert dual path+version → version-only on package, so they can only
          # dry-run once prior crates in the chain exist on crates.io. Live path therefore
          # interleaves: dry-run → publish → index pause → next crate.
          #
          # Pure dry-run workflow_dispatch (no prior registry presence): leaf crates get full
          # `cargo publish --dry-run`; dependents missing unreleased workspace deps fall back to
          # local `cargo check -p` plus dual-version metadata assert (still refuse reverse order).
          #
          # Day-0 multi-name / re-dispatch:
          # - versions already live for PUBLISH_VERSION skip cleanly (no forced republish)
          # - HTTP 429 / "too many new crates" / "try again after <date>": adaptive sleep + retry
          # - "already uploaded|already exists" from cargo: continue ordered chain

          for crate in ${PUBLISH_CRATES}; do
            echo "::group::${crate}"

            # Live re-dispatch path: if this exact version is already on crates.io, skip cleanly.
            # Never force-republish a live 0.1.0 (or any tag version) unless the package is bumped.
            if [[ "${is_dry}" != "true" ]] && crate_version_already_on_crates_io "${crate}" "${PUBLISH_VERSION}"; then
              echo "crate ${crate}@${PUBLISH_VERSION} already live on crates.io — skip publish (no forced republish)"
              echo "pausing briefly so dependents can resolve the existing index entry"
              sleep 5
              echo "::endgroup::"
              continue
            fi

            dry_ok=0
            attempt=1
            max_attempts=12
            while [[ ${attempt} -le ${max_attempts} ]]; do
              set +e
              dry_out="$(cargo publish --dry-run -p "${crate}" 2>&1)"
              dry_ec=$?
              set -e
              printf '%s\n' "${dry_out}"
              if [[ ${dry_ec} -eq 0 ]]; then
                dry_ok=1
                break
              fi
              # Already present on the registry can surface during dry-run packaging as well.
              if already_uploaded "${dry_out}"; then
                echo "crate ${crate} already on crates.io (dry-run signal) — skip live publish"
                dry_ok=3
                break
              fi
              if missing_registry_dep "${dry_out}"; then
                if [[ "${is_dry}" == "true" ]]; then
                  echo "NOTE: ${crate} dry-run blocked on crates.io absence of a prior workspace dep (expected pre-first-release)."
                  echo "Fallback: local cargo check -p ${crate} + dual path+version metadata assert."
                  cargo check -p "${crate}"
                  # Ensure dual path+version remains for monorepo packaging (not path-only).
                  if [[ "${crate}" != "basecrawl-headless-chrome" && "${crate}" != "basecrawl-proof" && "${crate}" != "basecrawl-fp" && "${crate}" != "basecrawl-seal" ]]; then
                    echo "dependent crate ${crate}: local check green; full publish --dry-run needs prior chain on registry (live tag path)."
                  fi
                  dry_ok=2
                  break
                fi
                # Live path: prior crate just published — wait for crates.io index to catch up.
                echo "waiting for crates.io index before dry-run of ${crate} (attempt ${attempt}/${max_attempts})"
                sleep 15
                attempt=$((attempt + 1))
                continue
              fi
              echo "cargo publish --dry-run -p ${crate} failed" >&2
              exit ${dry_ec}
            done

            if [[ ${dry_ok} -eq 0 ]]; then
              echo "exhausted retries waiting for registry deps for ${crate}" >&2
              exit 1
            fi

            if [[ "${is_dry}" == "true" ]]; then
              echo "dry_run: skip live cargo publish for ${crate}"
              echo "::endgroup::"
              continue
            fi

            if [[ ${dry_ok} -eq 3 ]]; then
              # already uploaded via dry-run signal
              echo "::endgroup::"
              continue
            fi

            # Live publish with adaptive 429 / new-crate rate-limit wait-retry.
            # Token only via CARGO_REGISTRY_TOKEN env; never echo the raw secret.
            live_ok=0
            live_attempt=1
            live_max="${NEW_CRATE_RATE_LIMIT_MAX_ATTEMPTS:-8}"
            while [[ ${live_attempt} -le ${live_max} ]]; do
              set +e
              live_out="$(cargo publish -p "${crate}" 2>&1)"
              live_ec=$?
              set -e
              # Echo cargo output (token values are masked by Actions if accidentally present).
              printf '%s\n' "${live_out}"
              if [[ ${live_ec} -eq 0 ]]; then
                live_ok=1
                echo "published ${crate}@${PUBLISH_VERSION}"
                break
              fi
              if already_uploaded "${live_out}"; then
                echo "crate ${crate} already on crates.io — continuing ordered chain"
                live_ok=2
                break
              fi
              if is_new_crate_rate_limited "${live_out}"; then
                wait_secs="$(compute_live_retry_wait_secs "${live_out}" "${live_attempt}")"
                echo "crates.io new-crate rate limit for ${crate} (HTTP 429 / too many new crates)"
                echo "adaptive wait ${wait_secs}s then retry (attempt ${live_attempt}/${live_max})"
                echo "re-dispatch of this workflow is also safe: already-live versions skip cleanly"
                sleep "${wait_secs}"
                live_attempt=$((live_attempt + 1))
                continue
              fi
              echo "cargo publish -p ${crate} failed (non-retriable)" >&2
              exit ${live_ec}
            done

            if [[ ${live_ok} -eq 0 ]]; then
              echo "exhausted rate-limit retries for ${crate}; re-dispatch when crates.io allows new names" >&2
              echo "already-uploaded crates in this tag version will skip on the next run" >&2
              exit 1
            fi

            # Index pause between crates so the next dry-run can resolve published deps.
            pause="${NEW_CRATE_INDEX_PAUSE_SECS:-20}"
            echo "post-publish index pause ${pause}s after ${crate}"
            sleep "${pause}"
            echo "::endgroup::"
          done

          if [[ "${is_dry}" == "true" ]]; then
            echo "dry_run complete: ordered topology walked; live publish skipped"
            echo "Cut tag v${PUBLISH_VERSION} (or workflow_dispatch dry_run=false) for live registry upload"
          else
            echo "Live ordered crates.io publish chain complete (already-live versions were skipped; 429s retried adaptively)"
          fi

  # ---------------------------------------------------------------------------
  # npm: @basecrawl/sdk (linux-x64 host). Multi-OS matrix is NOT required for M25.
  # Primary auth: npm Trusted Publishing via GitHub Actions OIDC (id-token: write).
  # No bypass-2FA NPM_TOKEN required for live `npm publish`.
  # ---------------------------------------------------------------------------
  npm:
    name: npm @basecrawl/sdk
    runs-on: ubuntu-latest
    needs:
      - version-check
      - crates
    # OIDC for npm Trusted Publishing (short-lived exchange; no long-lived write token).
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Trusted Publishing requires Node ≥22.14.0 (npm CLI ≥11.5.1).
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          # Scope for @basecrawl/sdk publish.
          scope: "@basecrawl"

      - name: Ensure npm CLI supports Trusted Publishing (11.5.1+)
        # setup-node Node 24 usually ships npm 10.x; npm Trusted Publishing needs ≥11.5.1.
        # Ref: https://docs.npmjs.com/trusted-publishers/
        run: |
          set -euo pipefail
          echo "node=$(node -v) npm=$(npm -v) before upgrade"
          npm install -g npm@11.5.1
          echo "node=$(node -v) npm=$(npm -v) after upgrade"
          node -e "
            const [maj, min, pat] = process.versions.node.split('.').map(Number);
            if (maj < 22 || (maj === 22 && min < 14)) {
              throw new Error('Node must be >=22.14 for npm Trusted Publishing, got ' + process.versions.node);
            }
            console.log('Node version gate OK (>=22.14):', process.versions.node);
          "
          node -e "
            const v = require('child_process').execSync('npm -v', {encoding:'utf8'}).trim();
            const [maj, min, pat] = v.split('.').map(Number);
            if (maj < 11 || (maj === 11 && min < 5) || (maj === 11 && min === 5 && pat < 1)) {
              throw new Error('npm CLI must be >=11.5.1 for Trusted Publishing, got ' + v);
            }
            console.log('npm CLI version gate OK (>=11.5.1):', v);
          "

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node build deps
        run: pnpm install

      - name: Assert linux-x64 honesty metadata (package.json)
        # VAL-NPM-003: single-arch ship must declare os/cpu; never multi-OS claim without artifacts.
        run: |
          set -euo pipefail
          node -e "
            const pkg = require('./package.json');
            if (pkg.name !== '@basecrawl/sdk') {
              throw new Error('package name must be @basecrawl/sdk, got ' + pkg.name);
            }
            const os = pkg.os || [];
            const cpu = pkg.cpu || [];
            if (!(Array.isArray(os) && os.length === 1 && os[0] === 'linux')) {
              throw new Error('package.os must be [\"linux\"] for M25 single-arch honesty, got ' + JSON.stringify(os));
            }
            if (!(Array.isArray(cpu) && cpu.length === 1 && cpu[0] === 'x64')) {
              throw new Error('package.cpu must be [\"x64\"] for M25 single-arch honesty, got ' + JSON.stringify(cpu));
            }
            console.log('linux-x64 honesty metadata OK:', pkg.name, 'os=', os, 'cpu=', cpu);
          "

      - name: Build native addon (linux-x64 honesty / prepack)
        # M25 ships the Linux CI host artifact only. Multi-OS napi matrix is out of scope.
        # package.json os/cpu + README residual constrain consumers to linux-x64.
        run: |
          set -euo pipefail
          uname -sm
          node -p "process.platform+'-'+process.arch"
          # prepack is what npm pack / publish lifecycle runs; build produces basecrawl_sdk.node.
          pnpm run prepack
          test -f basecrawl_sdk.node
          file basecrawl_sdk.node || true

      - name: Smoke require / version (linux host)
        run: |
          set -euo pipefail
          pnpm run smoke:linux
          node -e "
            const sdk = require('./index.js');
            const v = typeof sdk.version === 'function' ? sdk.version() : sdk.version;
            console.log('sdk.version=', v);
            if (!v) {
              throw new Error('missing sdk version after native load');
            }
            if (typeof sdk.scrape !== 'function') {
              throw new Error('missing scrape export');
            }
            console.log('linux smoke require OK');
          "

      - name: npm pack dry-run (always)
        run: |
          set -euo pipefail
          pnpm pack --pack-destination /tmp
          ls -la /tmp/*.tgz
          # List packing content for linux honesty audit (no secrets).
          listing="$(tar -tzf /tmp/basecrawl-sdk-*.tgz 2>/dev/null || tar -tzf /tmp/*.tgz)"
          printf '%s\n' "${listing}" | sed -n '1,80p'
          printf '%s\n' "${listing}" | grep -E 'basecrawl_sdk\.node$' >/dev/null
          printf '%s\n' "${listing}" | grep -E 'README\.md$' >/dev/null
          # Refuse multi-OS artifact names in the shipping tarball.
          if printf '%s\n' "${listing}" | grep -Eiq 'darwin|win32|windows|msvc|apple-darwin'; then
            echo "pack listing must not claim multi-OS native artifacts" >&2
            exit 1
          fi

      - name: Live npm publish via OIDC Trusted Publishing
        if: needs.version-check.outputs.dry_run != 'true'
        id: npm_publish
        continue-on-error: true
        # INTENTIONAL: no NODE_AUTH_TOKEN / NPM_TOKEN for primary path.
        # npm CLI ≥11.5.1 exchanges the Actions OIDC id-token for a short-lived
        # registry token when Trusted Publisher is configured for this workflow.
        # Optional secrets.NPM_TOKEN is not required and is not injected here.
        run: |
          set -euo pipefail
          # Confirm package name before publish (must be @basecrawl/sdk).
          NAME="$(node -p "require('./package.json').name")"
          VER="$(node -p "require('./package.json').version")"
          echo "Publishing ${NAME}@${VER} --access public (OIDC Trusted Publishing, linux host artifact)"
          if [[ "${NAME}" != "@basecrawl/sdk" ]]; then
            echo "package name must be @basecrawl/sdk, got ${NAME}" >&2
            exit 1
          fi
          # Probe registry presence (soft residual input; hard fail not used).
          # Never print credentials. Public GET only.
          set +e
          reg_http="$(curl -sS -o /tmp/npm-view-body.txt -w '%{http_code}' \
            "https://registry.npmjs.org/@basecrawl%2fsdk" 2>/dev/null)"
          reg_curl_ec=$?
          set -e
          echo "registry probe HTTP ${reg_http:-na} curl_ec=${reg_curl_ec}"
          package_on_registry="false"
          if [[ "${reg_curl_ec}" -eq 0 && "${reg_http}" == "200" ]]; then
            package_on_registry="true"
          fi
          echo "package_on_registry=${package_on_registry}"

          set +e
          # --provenance helps first-time Trusted Publishing paths; ignore if env forces off.
          out="$(npm publish --access public --provenance 2>&1)"
          ec=$?
          set -e
          # Log publisher stdout/stderr as-is. Actions masks any secret-shaped values.
          # Never echo NPM_TOKEN / NODE_AUTH_TOKEN.
          printf '%s\n' "${out}"
          if [[ ${ec} -eq 0 ]]; then
            echo "npm publish OK for ${NAME}@${VER} (OIDC Trusted Publishing)"
            exit 0
          fi
          if printf '%s\n' "${out}" | grep -Eqi 'cannot publish over|EPUBLISHCONFLICT|previously published|already been published'; then
            echo "package version already on npm — treating as success"
            exit 0
          fi

          # Soft residuals (keep crates path green): package missing or Trusted Publisher not wired.
          # Prefer more specific classes before generic org/scope leftovers.
          if [[ "${package_on_registry}" != "true" ]]; then
            {
              echo "TYPED_BLOCKER=package_not_on_registry"
              echo "detail=@basecrawl/sdk is not yet on the npm registry (HTTP ${reg_http:-na}). crates.io chain already succeeded. Path B: human echobt1 first-publish with interactive OTP from linux host bindings/node (prepack + smoke + npm publish --access public), then configure Trusted Publisher (GitHub org BaseIntelligence, repo basecrawl, workflow filename publish.yml, allow npm publish). Re-dispatch workflow_dispatch dry_run=false afterward."
            } | tee "${RUNNER_TEMP}/npm-typed-blocker.txt"
            echo "typed residual package_not_on_registry recorded"
            exit 42
          fi

          if printf '%s\n' "${out}" | grep -Eqi \
            'trusted.?publisher|OIDC|id-token|Unable to authenticate|ENEEDAUTH|does not have a trusted publisher|not configured for OIDC|exchange.*token|openid|federated'; then
            {
              echo "TYPED_BLOCKER=npm_trusted_publisher_missing"
              echo "detail=npm OIDC Trusted Publishing failed for @basecrawl/sdk while package appears to exist. Configure Trusted Publisher on npmjs.com: GitHub org/user BaseIntelligence, repository basecrawl, workflow filename publish.yml, allowed action npm publish. Job already has permissions.id-token: write and npm CLI >=11.5.1. crates.io chain green; no bypass-2FA NPM_TOKEN required for the primary path."
            } | tee "${RUNNER_TEMP}/npm-typed-blocker.txt"
            echo "typed residual npm_trusted_publisher_missing recorded"
            exit 42
          fi

          # Legacy residual classes retained for observability (token/org messages if env injects token elsewhere).
          if printf '%s\n' "${out}" | grep -Eqi \
            'Two-factor authentication|granular access token|bypass 2fa|bypass two-factor|OTP|one-time password'; then
            {
              echo "TYPED_BLOCKER=npm_trusted_publisher_missing"
              echo "detail=npm publish still demands 2FA/token auth; prefer Trusted Publisher OIDC (no bypass-2FA token). crates green. Configure Trusted Publisher for publish.yml or complete Path B OTP first create if package lifecycle blocked."
            } | tee "${RUNNER_TEMP}/npm-typed-blocker.txt"
            echo "typed residual treated as trusted-publisher gap (2fa/token residual)"
            exit 42
          fi
          if printf '%s\n' "${out}" | grep -Eqi \
            'not authorized|ENEEDAUTH|E404|404 Not Found|//registry.npmjs.org/@basecrawl|scope|organization|org'; then
            {
              echo "TYPED_BLOCKER=npm_trusted_publisher_missing"
              echo "detail=npm publish unauthorized after OIDC attempt; crates green. Likely missing Trusted Publisher binding or package access — configure BaseIntelligence/basecrawl/publish.yml Trusted Publisher or Path B local OTP first create."
            } | tee "${RUNNER_TEMP}/npm-typed-blocker.txt"
            echo "typed residual conflated into trusted-publisher gap"
            exit 42
          fi
          echo "npm publish failed (not a typed Trusted Publishing residual)" >&2
          exit ${ec}

      - name: Classify npm outcome
        if: needs.version-check.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # steps.npm_publish.outcome is success | failure | skipped
          outcome="${{ steps.npm_publish.outcome }}"
          conclusion="${{ steps.npm_publish.conclusion }}"
          echo "npm_publish outcome=${outcome} conclusion=${conclusion}"
          if [[ -f "${RUNNER_TEMP}/npm-typed-blocker.txt" ]]; then
            blocker="$(grep -E '^TYPED_BLOCKER=' "${RUNNER_TEMP}/npm-typed-blocker.txt" | head -1 | cut -d= -f2- || true)"
            echo "::warning::TYPED npm blocker (${blocker:-unknown}) — crates.io publish succeeded; npm deferred"
            cat "${RUNNER_TEMP}/npm-typed-blocker.txt"
            # Soft-pass so cross-publish topology (crates green → typed npm residual) is green.
            exit 0
          fi
          if [[ "${outcome}" == "failure" ]]; then
            echo "npm publish failed without typed Trusted Publishing residual classification" >&2
            exit 1
          fi
          echo "npm job complete"

      - name: Dry-run npm summary
        if: needs.version-check.outputs.dry_run == 'true'
        run: |
          echo "dry_run=true — built linux native + npm pack only; skipped npm publish"
          echo "live path uses OIDC Trusted Publishing (id-token: write, npm CLI >=11.5.1); NPM_TOKEN not required"
